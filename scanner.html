<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Scanner WA — Admin</title>

  <!-- Tesseract.js -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey            : "AIzaSyBRYbEnjS_yUP6iBvaGNS7OphxIYgL8OiI",
      authDomain        : "eleazar-app.firebaseapp.com",
      projectId         : "eleazar-app",
      storageBucket     : "eleazar-app.firebasestorage.app",
      messagingSenderId : "519327852561",
      appId             : "1:519327852561:web:3735226d159f6b1a64a9b0"
    };
    try {
      firebase.initializeApp(firebaseConfig);
      window._db = firebase.firestore();
    } catch(e) {
      console.error('Firebase gagal:', e);
      window._db = null;
    }
  </script>

  <style>
    :root {
      --sage:       #4a7c59;
      --sage-dark:  #3a6347;
      --sage-light: #90b898;
      --sage-pale:  #dceede;
      --parch:      #f0f5f0;
      --parch-2:    #e2ede4;
      --ink:        #1a2a1e;
      --ink-2:      #243828;
      --ink-3:      #4a6e52;
      --gold:       #a8c5a0;
      --cream:      #f5faf5;
      --radius:     14px;
      --shadow:     rgba(26,55,30,0.13);
      --red:        #c0392b;
      --orange:     #e67e22;
      --green:      #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--parch);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--sage-dark), var(--sage));
      color: #fff;
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .icon { font-size: 1.5rem; }
    header h1 { font-size: 1.05rem; font-weight: 700; line-height: 1.2; }
    header p  { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }
    #tglAktif {
      margin-left: auto;
      background: rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.75rem;
      text-align: right;
      line-height: 1.4;
    }
    #tglAktif strong { display: block; font-size: 0.82rem; }

    /* ── MAIN ── */
    main { padding: 16px; max-width: 700px; margin: 0 auto; }

    /* ── CARD ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 2px 10px var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-head {
      background: var(--parch-2);
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--sage-dark);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--gold);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-body { padding: 16px; }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 2.5px dashed var(--sage-light);
      border-radius: 12px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      background: var(--sage-pale);
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { background: #c8e6cc; border-color: var(--sage); }
    .upload-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-zone .uz-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-zone p { font-size: 0.88rem; color: var(--ink-2); }
    .upload-zone small { font-size: 0.75rem; color: var(--ink-3); margin-top: 4px; display: block; }

    /* preview gambar */
    #previewWrap { display: none; margin-top: 12px; position: relative; }
    #previewImg { width: 100%; border-radius: 10px; border: 1px solid var(--gold); max-height: 320px; object-fit: contain; background: #f0f0f0; }
    #btnGantiGambar {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: #fff;
      border: none; border-radius: 8px; padding: 4px 10px;
      font-size: 0.75rem; cursor: pointer;
    }

    /* ── TANGGAL ── */
    #inputTanggal {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--gold);
      border-radius: 10px; font-size: 0.95rem;
      color: var(--ink); background: var(--cream);
      margin-bottom: 4px;
    }
    #inputTanggal:focus { outline: none; border-color: var(--sage); }
    #hintJadwal {
      font-size: 0.78rem; color: var(--sage-dark);
      background: var(--sage-pale); border-radius: 8px;
      padding: 6px 10px; margin-top: 6px; display: none;
    }

    /* ── TOMBOL SCAN ── */
    #btnScan {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--sage-dark), var(--sage));
      color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s;
    }
    #btnScan:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── PROGRESS ── */
    #progressWrap { display: none; margin-top: 14px; }
    #progressBar {
      height: 8px; background: var(--parch-2);
      border-radius: 99px; overflow: hidden; margin-bottom: 6px;
    }
    #progressFill {
      height: 100%; background: var(--sage);
      border-radius: 99px; width: 0%;
      transition: width 0.3s;
    }
    #progressText { font-size: 0.78rem; color: var(--ink-3); text-align: center; }

    /* ── TABEL HASIL ── */
    #hasilWrap { display: none; }

    .stat-row {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .stat-chip {
      padding: 5px 12px; border-radius: 99px;
      font-size: 0.78rem; font-weight: 600;
    }
    .chip-total  { background: var(--parch-2); color: var(--ink-2); }
    .chip-ok     { background: #d4edda; color: #155724; }
    .chip-review { background: #fff3cd; color: #856404; }
    .chip-skip   { background: #f8d7da; color: #721c24; }

    .tbl-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 0.82rem;
    }
    th {
      background: var(--parch-2); color: var(--sage-dark);
      padding: 8px 10px; text-align: left;
      font-weight: 700; font-size: 0.75rem;
      letter-spacing: 0.03em; text-transform: uppercase;
      border-bottom: 2px solid var(--gold);
      white-space: nowrap;
    }
    td {
      padding: 8px 10px; border-bottom: 1px solid var(--parch-2);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.row-ok       { background: #f0fff4; }
    tr.row-review   { background: #fffbf0; }
    tr.row-skip     { background: #fff5f5; opacity: 0.7; }
    tr.row-duplikat { background: #fffbeb; border-left: 3px solid #f0ad4e; }

    .badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 99px; font-size: 0.72rem; font-weight: 700;
    }
    .badge-ok      { background: #d4edda; color: #155724; }
    .badge-review  { background: #fff3cd; color: #856404; }
    .badge-skip    { background: #f8d7da; color: #721c24; }
    .badge-duplikat{ background: #fff3cd; color: #856404; border: 1.5px solid #f0ad4e; }

    /* edit inline */
    .edit-bacaan {
      border: 1.5px solid var(--gold); border-radius: 7px;
      padding: 4px 7px; font-size: 0.82rem; width: 100%;
      background: #fff; color: var(--ink);
      font-family: monospace;
    }
    .edit-bacaan:focus { outline: none; border-color: var(--sage); }

    /* checkbox kolom simpan */
    .cb-simpan { width: 18px; height: 18px; accent-color: var(--sage); cursor: pointer; }

    /* ── AKSI BAWAH ── */
    .aksi-row {
      display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap;
    }
    .btn {
      flex: 1; min-width: 120px; padding: 11px 16px;
      border: none; border-radius: 11px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: var(--sage); color: #fff; }
    .btn-secondary{ background: var(--parch-2); color: var(--ink-2); }
    .btn-danger   { background: #fadbd8; color: var(--red); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff;
      padding: 10px 20px; border-radius: 99px;
      font-size: 0.85rem; font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 999; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── LOG OCR ── */
    #logOcr {
      display: none;
      background: #1a1a1a; color: #7fff7f;
      border-radius: 10px; padding: 12px;
      font-family: monospace; font-size: 0.73rem;
      max-height: 180px; overflow-y: auto;
      margin-top: 10px; white-space: pre-wrap;
    }
    #btnToggleLog {
      font-size: 0.75rem; color: var(--ink-3);
      background: none; border: none; cursor: pointer;
      margin-top: 6px; text-decoration: underline;
    }

    @media (max-width: 480px) {
      main { padding: 12px; }
      th, td { padding: 6px 8px; }
      .aksi-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="icon">📷</div>
  <div>
    <h1>Scanner WA</h1>
    <p>New Eleazar Project — Admin</p>
  </div>
  <div id="tglAktif">
    <strong id="kitabAktifLabel">—</strong>
    <span id="tglHariIni">—</span>
  </div>
</header>

<main>

  <!-- STEP 1: Tanggal -->
  <div class="card">
    <div class="card-head">📅 Tanggal Bacaan</div>
    <div class="card-body">
      <input type="date" id="inputTanggal">
      <div id="hintJadwal"></div>
    </div>
  </div>

  <!-- STEP 2: Upload gambar -->
  <div class="card">
    <div class="card-head">🖼️ Screenshot Chat WA</div>
    <div class="card-body">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="inputGambar" accept="image/*" multiple>
        <div class="uz-icon">📸</div>
        <p>Tap untuk pilih screenshot</p>
        <small>Bisa pilih lebih dari 1 gambar sekaligus</small>
      </div>
      <div id="previewWrap">
        <img id="previewImg" alt="Preview">
        <button id="btnGantiGambar" onclick="resetGambar()">✕ Ganti</button>
        <div style="font-size:0.75rem;color:var(--ink-3);margin-top:6px;" id="namaFile"></div>
      </div>
    </div>
  </div>

  <!-- STEP 3: Scan -->
  <div class="card">
    <div class="card-head">🔍 Proses OCR</div>
    <div class="card-body">
      <button id="btnScan" onclick="mulaiScan()" disabled>
        <span>📷</span> Scan Screenshot
      </button>
      <div id="progressWrap">
        <div id="progressBar"><div id="progressFill"></div></div>
        <div id="progressText">Mempersiapkan…</div>
      </div>
      <button id="btnToggleLog" onclick="toggleLog()" style="display:none;">Lihat teks mentah OCR</button>
      <div id="logOcr"></div>
    </div>
  </div>

  <!-- STEP 4: Hasil -->
  <div class="card" id="hasilWrap">
    <div class="card-head">✅ Hasil Parsing</div>
    <div class="card-body">
      <div class="stat-row" id="statRow"></div>
      <div class="tbl-wrap">
        <table id="tblHasil">
          <thead>
            <tr>
              <th>💾</th>
              <th>#</th>
              <th>Nama (ID)</th>
              <th>Bacaan</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
      <div class="aksi-row">
        <button class="btn btn-primary" id="btnSimpan" onclick="simpanKeFirebase()">
          🔥 Simpan ke Firebase
        </button>
        <button class="btn btn-secondary" onclick="resetSemua()">
          🔄 Scan Ulang
        </button>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════
// JADWAL PROGRAM (sama persis dengan index.html)
// ════════════════════════════════════════════
const JADWAL_PROGRAM = [
  { nama:'Kejadian',    ab:'Kej',  babMulai:32, babAkhir:50, mulai:'2026-06-01', selesai:'2026-06-19',
    regex:/Kej(?:adian)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Keluaran',    ab:'Kel',  babMulai:1,  babAkhir:40, mulai:'2026-06-20', selesai:'2026-07-29',
    regex:/Kel(?:uaran)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Imamat',      ab:'Im',   babMulai:1,  babAkhir:27, mulai:'2026-07-30', selesai:'2026-08-25',
    regex:/Im(?:amat)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Bilangan',    ab:'Bil',  babMulai:1,  babAkhir:36, mulai:'2026-08-26', selesai:'2026-09-30',
    regex:/Bil(?:angan)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Ulangan',     ab:'Ul',   babMulai:1,  babAkhir:34, mulai:'2026-10-01', selesai:'2026-11-03',
    regex:/Ul(?:angan)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Yosua',       ab:'Yos',  babMulai:1,  babAkhir:24, mulai:'2026-11-04', selesai:'2026-11-27',
    regex:/Yos(?:ua)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Hakim-hakim', ab:'Hak',  babMulai:1,  babAkhir:21, mulai:'2026-11-28', selesai:'2026-12-18',
    regex:/Hak(?:im(?:-hakim)?)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Rut',         ab:'Rut',  babMulai:1,  babAkhir:4,  mulai:'2026-12-19', selesai:'2026-12-22',
    regex:/Rut\s*[.:)]*\s*(\d+)/i },
  { nama:'1 Samuel',    ab:'1Sam', babMulai:1,  babAkhir:31, mulai:'2026-12-23', selesai:'2027-01-22',
    regex:/1\s*Sam(?:uel)?\s*[.:)]*\s*(\d+)/i },
  { nama:'2 Samuel',    ab:'2Sam', babMulai:1,  babAkhir:24, mulai:'2027-01-23', selesai:'2027-02-15',
    regex:/2\s*Sam(?:uel)?\s*[.:)]*\s*(\d+)/i },
  { nama:'1 Raja-raja', ab:'1Raj', babMulai:1,  babAkhir:22, mulai:'2027-02-16', selesai:'2027-03-09',
    regex:/1\s*Raj(?:a(?:-raja)?)?\s*[.:)]*\s*(\d+)/i },
  { nama:'2 Raja-raja', ab:'2Raj', babMulai:1,  babAkhir:25, mulai:'2027-03-10', selesai:'2027-04-03',
    regex:/2\s*Raj(?:a(?:-raja)?)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Yesaya',      ab:'Yes',  babMulai:1,  babAkhir:66, mulai:'2028-07-19', selesai:'2028-09-22',
    regex:/Yes(?:aya)?\s*[.:)]*\s*(\d+)/i },
  { nama:'Wahyu',       ab:'Why',  babMulai:1,  babAkhir:22, mulai:'2029-11-27', selesai:'2029-12-18',
    regex:/(?:Why|Wah(?:yu)?)\s*[.:)]*\s*(\d+)/i },
];

// Window transisi: berapa hari setelah pergantian kitab, laporan kitab lama masih diterima
const WINDOW_TRANSISI_HARI = 4;

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
const BULAN_ID = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];

function tglWIB() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Jakarta' }));
}

function isoWIB(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function fmtTgl(iso) {
  const [y,m,d] = iso.split('-');
  return `${parseInt(d)} ${BULAN_ID[parseInt(m)-1]} ${y}`;
}

function kitabAktifUntuk(isoTgl) {
  const tgl = new Date(isoTgl + 'T12:00:00+07:00');
  // Kitab utama hari ini
  const utama = JADWAL_PROGRAM.find(p => {
    const s = new Date(p.mulai + 'T00:00:00+07:00');
    const e = new Date(p.selesai + 'T23:59:59+07:00');
    return tgl >= s && tgl <= e;
  });
  // Kitab transisi: kitab sebelumnya jika masih dalam window
  const idx = utama ? JADWAL_PROGRAM.indexOf(utama) : -1;
  let transisi = null;
  if (idx > 0) {
    const prev = JADWAL_PROGRAM[idx - 1];
    const selesaiPrev = new Date(prev.selesai + 'T23:59:59+07:00');
    const diffMs = tgl - selesaiPrev;
    const diffHari = diffMs / (1000*60*60*24);
    if (diffHari <= WINDOW_TRANSISI_HARI) transisi = prev;
  }
  return { utama, transisi };
}

function updateHeaderInfo(isoTgl) {
  const { utama } = kitabAktifUntuk(isoTgl);
  document.getElementById('kitabAktifLabel').textContent = utama ? utama.nama : '—';
  document.getElementById('tglHariIni').textContent = fmtTgl(isoTgl);

  const hint = document.getElementById('hintJadwal');
  const { transisi } = kitabAktifUntuk(isoTgl);
  if (utama) {
    hint.style.display = 'block';
    hint.innerHTML = `📖 Kitab aktif: <strong>${utama.nama}</strong> (bab ${utama.babMulai}–${utama.babAkhir})` +
      (transisi ? ` &nbsp;|&nbsp; 🔥 Transisi: <strong>${transisi.nama}</strong>` : '');
  } else {
    hint.style.display = 'none';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const today = isoWIB(tglWIB());
  document.getElementById('inputTanggal').value = today;
  updateHeaderInfo(today);

  document.getElementById('inputTanggal').addEventListener('change', e => {
    updateHeaderInfo(e.target.value);
  });

  document.getElementById('inputGambar').addEventListener('change', handleFileSelect);

  // Drag & drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
  });
});

// ════════════════════════════════════════════
// FILE HANDLING
// ════════════════════════════════════════════
let fileList = [];

function handleFileSelect(e) { handleFiles(e.target.files); }

function handleFiles(files) {
  fileList = Array.from(files);
  if (!fileList.length) return;

  // Preview gambar pertama saja
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('uploadZone').style.display = 'none';
    const names = fileList.map(f => f.name).join(', ');
    document.getElementById('namaFile').textContent = `${fileList.length} gambar: ${names}`;
    document.getElementById('btnScan').disabled = false;
  };
  reader.readAsDataURL(fileList[0]);
}

function resetGambar() {
  fileList = [];
  document.getElementById('inputGambar').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('btnScan').disabled = true;
  document.getElementById('hasilWrap').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('logOcr').style.display = 'none';
  document.getElementById('btnToggleLog').style.display = 'none';
}

function resetSemua() {
  resetGambar();
  document.getElementById('hasilWrap').style.display = 'none';
}

// ════════════════════════════════════════════
// OCR — TESSERACT
// ════════════════════════════════════════════
let rawOcrText = '';

async function mulaiScan() {
  if (!fileList.length) return;
  const isoTgl = document.getElementById('inputTanggal').value;
  if (!isoTgl) { toast('⚠️ Pilih tanggal bacaan dulu!'); return; }

  document.getElementById('btnScan').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('hasilWrap').style.display = 'none';
  document.getElementById('logOcr').style.display = 'none';
  document.getElementById('btnToggleLog').style.display = 'none';
  rawOcrText = '';

  setProgress(0, 'Memuat Tesseract…');

  try {
    const worker = await Tesseract.createWorker('ind+eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          setProgress(Math.round(m.progress * 90), 'Membaca teks…');
        }
      }
    });

    let allText = '';
    for (let i = 0; i < fileList.length; i++) {
      setProgress(Math.round((i / fileList.length) * 85), `Scan gambar ${i+1}/${fileList.length}…`);
      const { data: { text } } = await worker.recognize(fileList[i]);
      allText += (i > 0 ? '\n---HALAMAN BARU---\n' : '') + text;
    }
    await worker.terminate();

    rawOcrText = allText;
    setProgress(95, 'Parsing hasil…');

    const hasil = parseOcr(allText, isoTgl);
    setProgress(100, 'Selesai!');

    tampilHasil(hasil);
    document.getElementById('btnToggleLog').style.display = 'block';
    setTimeout(() => {
      document.getElementById('progressWrap').style.display = 'none';
    }, 800);

  } catch(err) {
    console.error(err);
    toast('❌ Gagal scan: ' + err.message);
    document.getElementById('btnScan').disabled = false;
    setProgress(0, 'Gagal.');
  }
}

function setProgress(pct, txt) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = txt;
}

function toggleLog() {
  const el = document.getElementById('logOcr');
  const btn = document.getElementById('btnToggleLog');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    el.textContent = rawOcrText || '(kosong)';
    btn.textContent = 'Sembunyikan teks mentah';
  } else {
    el.style.display = 'none';
    btn.textContent = 'Lihat teks mentah OCR';
  }
}

// ════════════════════════════════════════════
// PARSER UTAMA v2 — robust multi-anomali
// ════════════════════════════════════════════

// ── Regex kitab: versi toleran untuk semua anomali penulisan ──
// Dibangun dinamis dari JADWAL_PROGRAM
// Menangani: "Kel 3", "Kel:3", "Kel. 3", "Kel.3", "KEL3", "kel 3", "Keluaran3"
function buildKitabRegex(jadwal) {
  // Ambil singkatan dan nama lengkap, buat regex sangat toleran
  // Contoh Kel → /(?:Keluaran|KEL|Kel|kel)\s*[.:),-]?\s*(\d+)/i
  return jadwal.map(p => {
    const ab  = p.ab.replace(/\s+/g, '\\s*');  // "1Sam" → "1\\s*Sam"
    const nm  = p.nama.replace(/\s+/g, '\\s*'); // "1 Samuel" → "1\\s*Samuel"
    // Escape karakter khusus di nama kitab (misal "Hakim-hakim")
    const nmEsc = nm.replace(/[-]/g, '[-\\s]*');
    const abEsc = ab.replace(/[-]/g, '[-\\s]*');
    // Pattern: (singkatan|nama_lengkap) lalu separator opsional lalu angka
    const pat = `(?:${nmEsc}|${abEsc})\\s*[.:),-]?\\s*(\\d+)`;
    return { ...p, regexToleran: new RegExp(pat, 'i') };
  });
}

/**
 * Bersihkan noise dari teks OCR sebelum diproses
 * Menangani: pesan sistem WA, header pengirim WA, timestamp, teks diedit
 */
function bersihkanNoise(teks) {
  return teks
    // ── Pesan sistem WA ──
    .replace(/Anda menghapus pesan ini/gi, '')
    .replace(/Pesan ini dihapus/gi, '')
    .replace(/This message was deleted/gi, '')
    .replace(/You deleted this message/gi, '')
    // ── Teks "Diedit HH.MM" yang muncul setelah edit pesan ──
    .replace(/Diedit\s+\d{1,2}[.:]\d{2}/gi, '')
    // ── Header pengirim WA: "~ Nama Lengkap +62 xxx-xxxx-xxxx" ──
    // Contoh: "~ Rini Jayanti +62 813-2766-991"
    // Contoh: "~ A 60 ES +62 812-3612-2332"
    .replace(/^~\s*.+?\+62[\d\s\-]+$/gm, '')
    // ── Timestamp berdiri sendiri: "07.41", "06.49", "13.24" ──
    .replace(/^\d{2}[.:]\d{2}$/gm, '')
    // ── Timestamp dengan label: "Diedit 08.39" ──
    .replace(/Diedit\s+\d{2}[.:]\d{2}/gi, '')
    // ── Tanda baca WA lainnya ──
    .replace(/---HALAMAN BARU---/g, '')
    // ── Baris kosong berlebih → satu baris kosong ──
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

/**
 * Normalisasi representasi simbol dari OCR yang kadang salah baca
 * 📖 bisa terbaca: [buku], (buku), huruf O, dll
 * ❤️ bisa terbaca: <3, [hati], (hati), o, 0, huruf O setelah baris kosong
 */
function normalisasiSimbol(teks) {
  return teks
    // Normalisasi 📖
    .replace(/\[buku\]|\(buku\)|🔖/gi, '📖')
    // Normalisasi 🔥
    .replace(/\[api\]|\(api\)/gi, '🔥')
    // Normalisasi ❤️: bentuk teks
    .replace(/\[hati\]|\(hati\)|<3/gi, '❤️')
    // ❤ (unicode tanpa variation selector) → ❤️
    .replace(/❤(?!️)/g, '❤️')
    // ♥ → ❤️
    .replace(/♥/g, '❤️');
}

/**
 * Normalisasi penulisan kitab yang beragam agar regex lebih mudah cocok:
 * - "Kel. :" → "Kel "     separator titik-titik dua
 * - "Kel:"   → "Kel "     titik dua langsung
 * - "Kel."   → "Kel "     titik langsung sebelum angka
 * - "Kel3"   → "Kel 3"    dempet angka
 * - "KEL 3"  → sudah ditangani oleh flag /i di regex
 */
function normalisasiKitab(teks) {
  return teks
    // Separator majemuk: "Kel. :" atau "Kel :" → "Kel "
    .replace(/([A-Za-z])\s*\.\s*:\s*/g, '$1 ')
    // Titik dua langsung: "Kel:" → "Kel "
    .replace(/([A-Za-z])\s*:\s*(?=\d)/g, '$1 ')
    // Titik langsung sebelum angka: "Kel.3" → "Kel 3"
    .replace(/([A-Za-z])\.\s*(?=\d)/g, '$1 ')
    // Dempet tanpa spasi: "Kel3" → "Kel 3" (hanya jika bukan angka sebelumnya)
    .replace(/([A-Za-z])(\d)/g, '$1 $2')
    // Strip leading zeros pada angka: "03" → "3"
    .replace(/\b0+(\d+)\b/g, '$1');
}

/**
 * Normalisasi penulisan ayat yang beragam:
 * "20, 21, 23"  → "20,21,23"
 * "20,21,23"    → "20,21,23"   (sudah bersih)
 * "21, 22-23"   → "21,22-23"
 * "21 - 23"     → "21-23"
 * "21-23"       → "21-23"      (sudah bersih)
 * "14,15."      → "14,15"      (hapus trailing titik)
 * "8-10, 19-22" → "8-10,19-22"
 */
function normalisasiAyat(str) {
  if (!str) return '';
  return str
    .trim()
    .replace(/\s*-\s*/g, '-')    // "21 - 23" → "21-23"
    .replace(/\s*,\s*/g, ',')    // "20, 21" → "20,21"
    .replace(/[.;]+$/g, '')      // hapus trailing titik/titik koma
    .replace(/[^\d,\-]/g, '')    // hanya sisakan angka, koma, strip
    .replace(/,+/g, ',')         // koma ganda → satu
    .replace(/^[,\-]|[,\-]$/g,''); // hapus koma/strip di ujung
}

/**
 * Ekstrak ID peserta dari teks
 * Anomali yang ditangani:
 * - "(037)" → "037"   standar 3 digit dalam kurung
 * - "(37)"  → "037"   2 digit dalam kurung → pad jadi 3
 * - "037"   → "037"   3 digit tanpa kurung
 * - "37"    (2 digit tanpa kurung) → diabaikan, ambigu dengan nomor urut
 */
function ekstrakId(teks) {
  // Prioritas 1: dalam kurung, 2-3 digit
  const m1 = teks.match(/\((\d{2,3})\)/);
  if (m1) return m1[1].padStart(3, '0');
  // Prioritas 2: tanpa kurung, tepat 3 digit, bukan bagian dari angka lebih panjang
  const m2 = teks.match(/(?<!\d)(\d{3})(?!\d)/);
  if (m2) return m2[1];
  return '';
}

/**
 * Ekstrak nama peserta dari baris nama
 * Anomali yang ditangani:
 * - "08. Agus (037)"     → "Agus"
 * - "5.Yuni (041)"       → "Yuni"
 * - "Eka (021)"          → "Eka"       (tanpa nomor urut)
 * - "Nanang (013)"       → "Nanang"    (tanpa nomor urut)
 * - "**Ari L (005)**"    → "Ari L"     (bold markdown WA)
 * - "Agus 037"           → "Agus"      (ID tanpa kurung)
 * - "Tri (003)"          → "Tri"       (nama pendek)
 */
function ekstrakNama(teks) {
  return teks
    .replace(/\*+/g, '')             // hapus bold markdown WA (**nama**)
    .replace(/^\d+\s*[.\s]\s*/, '')  // hapus nomor urut di awal: "08. " atau "5."
    .replace(/\(\d{2,3}\)/g, '')     // hapus (ID) dalam kurung
    .replace(/(?<!\d)\d{3}(?!\d)/g, '') // hapus ID 3 digit tanpa kurung
    .replace(/[~+\-_]/g, ' ')        // ganti karakter noise jadi spasi
    .replace(/\s+/g, ' ')            // spasi berlebih → satu spasi
    .trim();
}

/**
 * Deteksi apakah satu baris adalah baris nama peserta
 *
 * Baris nama PASTI mengandung salah satu:
 * (a) ID dalam kurung: (037), (21), (005)
 * (b) Nomor urut di awal + huruf kapital: "08. Agus", "5.Yuni"
 * (c) ID 3 digit tanpa kurung + nama: "Agus 037"
 *
 * Baris nama TIDAK mengandung:
 * - Nama kitab aktif (Kel, Kej, Im, dst)
 * - Simbol bacaan (📖, ❤️)
 * - Nomor telepon (+62)
 * - Hanya angka saja
 * - Timestamp (HH.MM)
 * - Header WA (dimulai ~)
 */
function adalahBarisPeserta(baris, kitabValid) {
  const b = baris.trim();
  if (!b || b.length > 80) return false;

  // Buang jelas bukan nama
  if (b.startsWith('~')) return false;                    // header WA
  if (/^\+62/.test(b)) return false;                     // nomor telepon
  if (/^\d{2}[.:]\d{2}$/.test(b)) return false;         // timestamp
  if (/^[\d\s,.\-]+$/.test(b)) return false;             // hanya angka
  if (b.includes('📖') || b.includes('❤️') || b.includes('🔥')) return false; // baris bacaan

  // Buang baris yang mengandung nama kitab aktif
  const namaKitab = kitabValid.flatMap(k => [k.ab, k.nama.split(' ').pop()]);
  const kitabPat  = new RegExp(`\\b(${namaKitab.join('|')})\\b`, 'i');
  if (kitabPat.test(b)) return false;

  // POSITIF: mengandung ID dalam kurung
  if (/\(\d{2,3}\)/.test(b)) return true;
  // POSITIF: nomor urut di awal diikuti nama dengan huruf kapital
  if (/^\d+\s*[.]\s*[A-Z]/.test(b)) return true;
  // POSITIF: nama kapital + 3 digit tanpa kurung (misal "Agus 037")
  if (/[A-Z][a-z]+\s+\d{3}(?!\d)/.test(b)) return true;

  return false;
}

/**
 * Ekstrak semua pasangan (kitab+bab, ayat) dari satu blok pesan peserta
 * Menangani multi-bacaan: satu orang kirim Kel 2 + Kel 3 sekaligus
 *
 * Strategi: scan baris per baris, cari pola kitab lalu cari ayat di baris berikutnya
 * (atau di baris yang sama jika inline, misal "📖 Kel 3 ❤️ 10,12")
 */
function ekstrakBacaanBlok(blokBaris, kitabValid, jadwalToleran) {
  const entries = [];
  let tipeAktif  = '📖';
  let kitabPending = null;
  let babPending   = null;

  for (let i = 0; i < blokBaris.length; i++) {
    const b = blokBaris[i].trim();
    if (!b) continue;

    // Tipe bacaan
    if (b.includes('📖')) tipeAktif = '📖';
    if (b.includes('🔥')) tipeAktif = '🔥';

    // ── Cari kitab di baris ini ──
    for (const jt of jadwalToleran) {
      // Cek apakah kitab ini valid untuk tanggal (ada di kitabValid)
      if (!kitabValid.find(kv => kv.ab === jt.ab)) continue;
      const m = b.match(jt.regexToleran);
      if (m) {
        const bab = parseInt(m[1]);
        if (bab >= jt.babMulai && bab <= jt.babAkhir) {
          // Kalau ada kitab pending yang belum dapat ayat → simpan tanpa ayat
          if (kitabPending && !entries.find(e => e.kitab.ab === kitabPending.ab && e.bab === babPending)) {
            entries.push({ tipe: tipeAktif, kitab: kitabPending, bab: babPending, ayat: '' });
          }
          kitabPending = jt;
          babPending   = bab;

          // Cek apakah ayat ada di baris yang sama (inline): "📖 Kel 3 ❤️ 10,12"
          const sisaBaris = b.slice(b.search(jt.regexToleran) + m[0].length);
          if (sisaBaris.includes('❤️')) {
            const ayatRaw = sisaBaris.replace(/❤️/g, '').trim();
            const ayat = normalisasiAyat(ayatRaw);
            if (ayat && /\d/.test(ayat)) {
              entries.push({ tipe: tipeAktif, kitab: jt, bab, ayat });
              kitabPending = null; babPending = null;
            }
          }
        }
        break;
      }
    }

    // ── Cari ayat di baris ini (setelah ❤️ atau baris angka murni) ──
    const adaHati   = b.includes('❤️');
    const angkaMurni = /^[\d,\-\s.]+$/.test(b) && /\d/.test(b);

    if ((adaHati || angkaMurni) && kitabPending) {
      const ayatRaw = b.replace(/❤️/g, '').trim();
      const ayat    = normalisasiAyat(ayatRaw);
      if (ayat && /\d/.test(ayat)) {
        entries.push({ tipe: tipeAktif, kitab: kitabPending, bab: babPending, ayat });
        kitabPending = null; babPending = null;
      }
    }
  }

  // Kitab terakhir yang belum dapat ayat
  if (kitabPending) {
    entries.push({ tipe: tipeAktif, kitab: kitabPending, bab: babPending, ayat: '' });
  }

  return entries;
}

/**
 * Format output baku: "Keluaran 3 : 10,12"
 * Multi-bacaan:       "Keluaran 2 : 7-8 | Keluaran 3 : 20"
 */
/**
 * Format output baku:
 *   📖 → "Keluaran 3 : 10,12"       (tepat waktu, tanpa prefix)
 *   🔥 → "🔥 Keluaran 2 : 7-8"      (bacaan telat, prefix 🔥)
 * Multi: "Keluaran 3 : 20 | 🔥 Keluaran 2 : 7-8"
 */
function formatBacaan(entries) {
  return entries.map(e => {
    const prefix     = e.tipe === '🔥' ? '🔥 ' : '';
    const ayatBagian = e.ayat ? ` : ${e.ayat}` : '';
    return `${prefix}${e.kitab.nama} ${e.bab}${ayatBagian}`;
  }).join(' | ');
}

/**
 * PARSER UTAMA v2
 * Input : teks OCR mentah dari Tesseract, tanggal ISO
 * Output: array hasil [{ nama, id, bacaan, status, alasan }]
 *
 * Alur:
 * 1. Bersihkan noise (pesan sistem WA, header pengirim, timestamp)
 * 2. Normalisasi simbol emoji
 * 3. Normalisasi penulisan kitab
 * 4. Scan baris per baris → deteksi baris nama peserta
 * 5. Kumpulkan baris sampai nama peserta berikutnya (= satu blok)
 * 6. Dalam setiap blok, ekstrak bacaan (kitab+bab+ayat), termasuk multi-bacaan
 * 7. Tentukan status: ok / review / skip
 */
function parseOcr(teksAsli, isoTgl) {
  const { utama, transisi } = kitabAktifUntuk(isoTgl);

  if (!utama) {
    return [{ nama: '—', id: '', bacaan: '', status: 'skip', alasan: 'Tidak ada jadwal aktif untuk tanggal ini' }];
  }

  const kitabValid    = [utama, transisi].filter(Boolean);
  const jadwalToleran = buildKitabRegex(JADWAL_PROGRAM);

  // Preprocessing
  let teks = bersihkanNoise(teksAsli);
  teks     = normalisasiSimbol(teks);
  teks     = normalisasiKitab(teks);

  const semuaBaris = teks.split('\n');
  const hasil      = [];

  let blokBaris = [];
  let namaBlok  = '';
  let idBlok    = '';

  const flushBlok = () => {
    if (!namaBlok || !blokBaris.length) return;

    const entries = ekstrakBacaanBlok(blokBaris, kitabValid, jadwalToleran);

    if (entries.length === 0) {
      // Tidak ada bacaan terdeteksi → 1 baris skip
      if (namaBlok.length >= 2) {
        hasil.push({
          nama: namaBlok, id: idBlok, bacaan: '', status: 'skip',
          alasan: 'Kitab aktif tidak ditemukan dalam pesan'
        });
      }
    } else {
      // Setiap entry jadi BARIS TERPISAH agar mudah diedit
      // Nama ditampilkan di baris pertama, baris berikutnya pakai label "(lanjutan)"
      entries.forEach((e, idx) => {
        const bacaan   = formatBacaan([e]);
        const adaAyat  = !!e.ayat;
        const isTelat  = e.tipe === '🔥';
        let status, alasan;

        if (adaAyat) {
          status = 'ok';
          alasan = isTelat ? '🔥 Bacaan telat' : '';
        } else {
          status = 'review';
          alasan = 'Ayat tidak terdeteksi' + (isTelat ? ' · 🔥 bacaan telat' : '');
        }

        // Nama: baris pertama tampil nama asli, baris berikutnya beri tanda lanjutan
        const namaRow = idx === 0
          ? namaBlok
          : `${namaBlok} ↩`;

        if (namaBlok.length >= 2) {
          hasil.push({ nama: namaRow, id: idBlok, bacaan, status, alasan });
        }
      });
    }

    blokBaris = [];
    namaBlok  = '';
    idBlok    = '';
  };

  for (const baris of semuaBaris) {
    const trimmed = baris.trim();
    if (!trimmed) continue;

    if (adalahBarisPeserta(trimmed, kitabValid)) {
      flushBlok();
      namaBlok = ekstrakNama(trimmed);
      idBlok   = ekstrakId(trimmed);
    }

    blokBaris.push(trimmed);
  }
  flushBlok();

  return hasil.length ? hasil : [{
    nama: '—', id: '', bacaan: '',
    status: 'skip',
    alasan: 'Tidak ada entri terdeteksi — coba lihat teks mentah OCR'
  }];
}

// ════════════════════════════════════════════
// TAMPIL HASIL
// ════════════════════════════════════════════
let hasilParsing = [];

function tampilHasil(hasil) {
  hasilParsing = hasil;
  document.getElementById('hasilWrap').style.display = 'block';

  // Statistik
  const total   = hasil.length;
  const ok      = hasil.filter(h => h.status === 'ok').length;
  const review  = hasil.filter(h => h.status === 'review').length;
  const skip    = hasil.filter(h => h.status === 'skip').length;

  document.getElementById('statRow').innerHTML = `
    <span class="stat-chip chip-total">📊 Total: ${total}</span>
    <span class="stat-chip chip-ok">✅ Siap: ${ok}</span>
    <span class="stat-chip chip-review">⚠️ Perlu cek: ${review}</span>
    <span class="stat-chip chip-skip">❌ Dilewati: ${skip}</span>
  `;

  const tbody = document.getElementById('tblBody');
  tbody.innerHTML = '';

  hasil.forEach((h, i) => {
    const adaTelat   = h.bacaan.includes('🔥');
    const rowClass   = h.status === 'ok'
                         ? (adaTelat ? 'row-ok' : 'row-ok')
                         : h.status === 'review' ? 'row-review' : 'row-skip';
    const badgeClass = h.status === 'ok'
                         ? (adaTelat ? 'badge-ok' : 'badge-ok')
                         : h.status === 'review' ? 'badge-review' : 'badge-skip';
    const badgeTxt   = h.status === 'ok'
                         ? (adaTelat ? '✅🔥 Siap+Telat' : '✅ Siap')
                         : h.status === 'review' ? '⚠️ Cek' : '❌ Skip';
    const cbChecked  = h.status !== 'skip' ? 'checked' : '';
    const cbDisabled = h.status === 'skip' ? 'disabled' : '';

    const isLanjutan = h.nama.endsWith(' ↩');
    const namaAsli   = isLanjutan ? h.nama.slice(0, -2) : h.nama;
    const namaId     = h.id
      ? `${namaAsli} <span style="color:var(--ink-3);font-size:0.75rem">(${h.id})</span>`
      : namaAsli;
    // Baris lanjutan: indent + label kecil
    const namaHtml   = isLanjutan
      ? `<span style="color:var(--ink-3);font-size:0.78rem;padding-left:12px;">↩ ${namaId}</span>`
      : namaId;
    // Alasan: orange untuk warning, sage untuk info telat
    const alasanColor = h.alasan.startsWith('🔥') ? 'var(--sage-dark)' : 'var(--orange)';
    const alasanHtml  = h.alasan
      ? `<div style="font-size:0.7rem;color:${alasanColor};margin-top:2px;">${h.alasan}</div>`
      : '';

    tbody.innerHTML += `
      <tr class="${rowClass}" id="row-${i}" ${isLanjutan ? 'style="border-top:none;"' : ''}>
        <td><input type="checkbox" class="cb-simpan" id="cb-${i}" ${cbChecked} ${cbDisabled}></td>
        <td style="color:var(--ink-3);font-size:0.78rem">${i+1}</td>
        <td>${namaHtml}${alasanHtml}</td>
        <td><input type="text" class="edit-bacaan" id="bacaan-${i}" value="${h.bacaan}" placeholder="Ketik manual…" oninput="onEditBacaan(${i})"></td>
        <td><span class="badge ${badgeClass}" id="badge-${i}">${badgeTxt}</span></td>
      </tr>
    `;
  });

  document.getElementById('btnScan').disabled = false;
  toast(`✅ Selesai — ${total} entri terdeteksi`);
}

function onEditBacaan(i) {
  const val = document.getElementById(`bacaan-${i}`).value.trim();
  hasilParsing[i].bacaan = val;
  // Update badge jadi review kalau diubah manual
  const badge = document.getElementById(`badge-${i}`);
  if (val) {
    badge.className = 'badge badge-review';
    badge.textContent = '✏️ Manual';
    document.getElementById(`cb-${i}`).checked = true;
    document.getElementById(`cb-${i}`).disabled = false;
  }
}

// ════════════════════════════════════════════
// SIMPAN KE FIREBASE — dengan cek duplikat
// ════════════════════════════════════════════

/**
 * Ekstrak kitab + bab dari string bacaan
 * Contoh: "Keluaran 7 : 8,10" → { kitab: "Keluaran", bab: 7 }
 * Contoh: "Keluaran 2 : 24 | Keluaran 1 : 17" → [{ kitab: "Keluaran", bab: 2 }, ...]
 */
function parseBacaanUntukDupCek(bacaan) {
  const hasil = [];
  // Split multi-entry (pakai " | ")
  const bagian = bacaan.split('|');
  for (const bag of bagian) {
    // Hapus prefix 🔥 jika ada sebelum parsing
    const bersih = bag.replace(/🔥\s*/g, '').trim();
    // Cocokkan pola "NamaKitab ANGKA"
    const m = bersih.match(/^([A-Za-z\s]+?)\s+(\d+)/);
    if (m) {
      hasil.push({
        kitab: m[1].trim(),
        bab  : parseInt(m[2])
      });
    }
  }
  return hasil;
}

/**
 * Cek apakah satu entri sudah ada di Firestore
 * Cocok jika: idPeserta sama + tanggal sama + bacaan mengandung kitab+bab yang sama
 * Return: null (tidak duplikat) | dokumen pertama yang cocok
 */
async function cekDuplikat(idPeserta, isoTgl, bacaan) {
  if (!idPeserta) return null; // tanpa ID tidak bisa cek akurat
  const parsedBacaan = parseBacaanUntukDupCek(bacaan);
  if (!parsedBacaan.length) return null;

  try {
    // Query Firestore: jurnal dengan idPeserta + tanggal yang sama
    const snap = await window._db.collection('jurnal')
      .where('idPeserta', '==', idPeserta)
      .where('tanggal', '==', isoTgl)
      .get({ source: 'server' });

    if (snap.empty) return null;

    // Cek apakah ada dokumen yang bacaannya mengandung kitab+bab yang sama
    for (const doc of snap.docs) {
      const bacaanLama = doc.data().bacaan || '';
      const parsedLama = parseBacaanUntukDupCek(bacaanLama);
      // Duplikat jika ada irisan kitab+bab
      for (const baru of parsedBacaan) {
        for (const lama of parsedLama) {
          if (baru.kitab === lama.kitab && baru.bab === lama.bab) {
            return doc.data(); // kembalikan data dokumen lama
          }
        }
      }
    }
    return null;
  } catch(e) {
    console.warn('Cek duplikat gagal:', e);
    return null; // kalau gagal cek, biarkan lanjut
  }
}

async function simpanKeFirebase() {
  if (!window._db) { toast('❌ Firebase tidak terhubung!'); return; }

  const isoTgl = document.getElementById('inputTanggal').value;
  if (!isoTgl) { toast('⚠️ Tanggal tidak dipilih!'); return; }

  // Kumpulkan entri yang dicentang
  const indeksDipilih = [];
  for (let i = 0; i < hasilParsing.length; i++) {
    const cb = document.getElementById(`cb-${i}`);
    const bacaan = document.getElementById(`bacaan-${i}`)?.value.trim();
    if (cb && cb.checked && bacaan) indeksDipilih.push(i);
  }

  if (!indeksDipilih.length) { toast('⚠️ Tidak ada entri yang dipilih!'); return; }

  const btn = document.getElementById('btnSimpan');
  btn.disabled = true;
  btn.innerHTML = '🔍 Cek duplikat…';

  // ── FASE 1: Cek duplikat semua entri yang dicentang ──
  let adaDuplikat = false;
  for (const i of indeksDipilih) {
    const h = hasilParsing[i];
    // Skip entri yang sudah pernah ditandai override
    if (h._overrideKonfirmasi) continue;

    const bacaan = document.getElementById(`bacaan-${i}`).value.trim();
    const dupDoc = await cekDuplikat(h.id, isoTgl, bacaan);

    if (dupDoc) {
      adaDuplikat = true;
      h._isDuplikat = true;

      // Tandai baris sebagai duplikat
      const row = document.getElementById(`row-${i}`);
      if (row) {
        row.className = 'row-duplikat';
        row.style.borderLeft = '3px solid #f0ad4e';
      }
      const badge = document.getElementById(`badge-${i}`);
      if (badge) {
        badge.className = 'badge badge-duplikat';
        badge.textContent = '⚠️ Duplikat';
      }

      // Tampilkan info bacaan lama di bawah nama
      const namaCell = row?.querySelector('td:nth-child(3)');
      if (namaCell && !namaCell.querySelector('.dup-info')) {
        const dupInfo = document.createElement('div');
        dupInfo.className = 'dup-info';
        dupInfo.style.cssText = 'font-size:0.7rem;color:#856404;margin-top:3px;background:#fff3cd;border-radius:5px;padding:2px 6px;';
        dupInfo.textContent = `⚠️ Sudah ada: ${dupDoc.bacaan || '(tanpa bacaan)'} — centang ulang untuk override`;
        namaCell.appendChild(dupInfo);
      }

      // Uncheck otomatis
      const cb = document.getElementById(`cb-${i}`);
      if (cb) cb.checked = false;
    }
  }

  btn.disabled = false;
  btn.innerHTML = '🔥 Simpan ke Firebase';

  if (adaDuplikat) {
    toast('⚠️ Ada duplikat — tandai ulang untuk tetap simpan');
    return; // Berhenti, biarkan admin review dulu
  }

  // ── FASE 2: Tidak ada duplikat baru → simpan semua yang dicentang ──
  btn.disabled = true;
  btn.innerHTML = '⏳ Menyimpan…';

  let sukses = 0;
  let gagal  = 0;

  for (let i = 0; i < hasilParsing.length; i++) {
    const cb = document.getElementById(`cb-${i}`);
    if (!cb || !cb.checked) continue;
    const bacaan = document.getElementById(`bacaan-${i}`).value.trim();
    if (!bacaan) continue;

    const h = hasilParsing[i];
    const isOverride = !!h._isDuplikat; // entri ini duplikat yang sengaja di-override

    try {
      await window._db.collection('jurnal').add({
        nama      : h.nama,
        idPeserta : h.id || '',
        tanggal   : isoTgl,
        bacaan    : bacaan,
        refleksi  : '',
        waktu     : firebase.firestore.Timestamp.now(),
        sumber    : isOverride ? 'scanner-override' : 'scanner'
      });
      sukses++;
      const row = document.getElementById(`row-${i}`);
      if (row) { row.style.opacity = '0.5'; row.style.background = '#d4edda'; }
      // Hapus flag duplikat setelah berhasil simpan
      h._isDuplikat = false;
      h._overrideKonfirmasi = true;
    } catch(e) {
      console.error('Gagal simpan:', h.nama, e);
      gagal++;
    }
  }

  btn.disabled = false;
  btn.innerHTML = '🔥 Simpan ke Firebase';

  if (sukses > 0 && gagal === 0) {
    toast(`✅ ${sukses} entri berhasil disimpan!`);
  } else if (gagal > 0) {
    toast(`⚠️ ${sukses} berhasil, ${gagal} gagal — cek koneksi`);
  }
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
